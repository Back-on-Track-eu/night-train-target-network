name: bot_target_network

# Self-contained devcontainer stack for VS Code / frontend development.
# Duplicates postgres and openrailrouting from backend/docker/docker-compose.yml
# so we avoid include: merge validation issues. Keep in sync if base services change.

services:

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: night_train_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  openrailrouting:
    build:
      context: ../backend/models/route/routing/docker
      dockerfile: Dockerfile
    image: docker-openrailrouting
    container_name: openrailrouting
    ports:
      - "${OPENRAILROUTING_HOST_PORT:-8989}:8989"
      - "8990:8990"
    volumes:
      - ../backend/models/route/routing/docker/data:/app/data
      - ../backend/models/route/routing/docker/graph-cache:/app/graph-cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  backend-api:
    build:
      context: ../backend
      dockerfile: docker/Dockerfile
    container_name: backend-api
    ports:
      - "5000:5000"
    env_file:
      - ../backend/docker/.env
    environment:
      POSTGRES_HOST: postgres
      OPENRAILROUTING_URL: http://openrailrouting:8989
    volumes:
      - ..:/workspace:cached
      - ~/.ssh:/root/.ssh:ro
    depends_on:
      postgres:
        condition: service_healthy
      openrailrouting:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: night-train-frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  pgdata: