name: bot_target_network

# Extends the canonical backend service definitions and adds
# VS Code devcontainer-specific configuration.
# Frontend-specific services go here too.

include:
  - path: ../backend/docker/docker-compose.yml
    env_file: .env

services:

  api:
    # Override credentials mount with :? to fail loudly if variable is unset
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:?Set GOOGLE_APPLICATION_CREDENTIALS in .env}:/run/secrets/google_credentials:ro
      - ..:/workspace:cached
      - ~/.ssh:/root/.ssh:ro
    # Healthcheck needed here so setup.sh can wait for the API to be ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s