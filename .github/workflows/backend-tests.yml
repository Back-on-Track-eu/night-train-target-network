name: Backend Integration Tests

on:
  push:
    branches: [main, backend-dev]
    paths:
      - 'backend/**'
      - '.devcontainer/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.devcontainer/**'
      - '.github/workflows/backend-tests.yml'

jobs:

  # ============================================================
  # JOB 1 — Version bump enforcement
  # Fails if a model file changed but its version constant did not.
  # ============================================================
  version-check:
    name: Version bump check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for diff

      - name: Check version bumps
        run: |
          # Fetch main so we can diff against it
          git fetch origin main --depth=1 2>/dev/null || true

          # Base ref: main on PRs, previous commit on push
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/main"
          else
            BASE="${{ github.event.before }}"
            # On first push or force push, event.before may be all zeros
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              echo "First push — skipping version check."
              exit 0
            fi
          fi

          FAIL=0

          check_version() {
            local model_file="$1"
            local version_file="$2"
            local version_const="$3"

            # Check if model file changed
            if git diff --name-only "$BASE" HEAD -- "$model_file" | grep -q .; then
              # Get old and new version constants
              old_ver=$(git show "$BASE:$version_file" 2>/dev/null | grep "^${version_const}" | grep -oP '"\K[^"]+(?=")' | head -1)
              new_ver=$(grep "^${version_const}" "$version_file" 2>/dev/null | grep -oP '"\K[^"]+(?=")' | head -1)

              if [ "$old_ver" = "$new_ver" ]; then
                echo "❌  VERSION NOT BUMPED: $model_file changed but $version_const stayed at '$new_ver'"
                echo "    Please update $version_const in $version_file"
                FAIL=1
              else
                echo "✓  $version_const bumped: $old_ver → $new_ver  ($model_file changed)"
              fi
            fi
          }

          # Route builder
          check_version \
            "backend/models/route/route_factory.py" \
            "backend/models/route/version.py" \
            "ROUTE_BUILDER_VERSION"

          check_version \
            "backend/models/route/trip.py" \
            "backend/models/route/version.py" \
            "ROUTE_BUILDER_VERSION"

          check_version \
            "backend/models/route/route.py" \
            "backend/models/route/version.py" \
            "ROUTE_BUILDER_VERSION"

          check_version \
            "backend/models/route/routing/rail_router.py" \
            "backend/models/route/version.py" \
            "ROUTE_BUILDER_VERSION"

          # Energy model
          check_version \
            "backend/models/energy/calc_energy_consumption.py" \
            "backend/models/energy/version.py" \
            "ENERGY_CALC_VERSION"

          # Cost/revenue evaluation
          check_version \
            "backend/models/evaluation/calc.py" \
            "backend/models/evaluation/version.py" \
            "CALC_VERSION"

          if [ $FAIL -ne 0 ]; then
            echo ""
            echo "One or more model files were changed without bumping the version."
            echo "Update the version constant and add a CHANGELOG entry before merging."
            exit 1
          fi

          echo ""
          echo "All version checks passed."

  # ============================================================
  # JOB 2 — Integration tests
  # ============================================================
  test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: version-check
    timeout-minutes: 30

    env:
      POSTGRES_HOST:     localhost
      POSTGRES_PORT:     5432
      POSTGRES_DB:       target_network_test_db
      POSTGRES_USER:     bot_admin
      POSTGRES_PASSWORD: devpassword

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Cache the OpenRailRouting graph
      # ------------------------------------------------------------------
      - name: Cache OpenRailRouting graph
        id: cache-graph
        uses: actions/cache@v4
        with:
          path: backend/models/route/routing/docker/graph-cache
          key: openrailrouting-graph-${{ hashFiles('backend/models/route/routing/docker/config.yml') }}

      - name: Download graph cache if not cached
        if: steps.cache-graph.outputs.cache-hit != 'true'
        run: |
          mkdir -p backend/models/route/routing/docker/graph-cache
          FILE_ID="1tWt1OX7mzPA7Ylo9KqmTK6YluRXEtt8z"
          URL="https://drive.usercontent.google.com/download?id=${FILE_ID}&export=download&confirm=t"
          curl -L "$URL" -o /tmp/graph-cache.zip
          unzip -o /tmp/graph-cache.zip -d backend/models/route/routing/docker/graph-cache
          rm /tmp/graph-cache.zip

      # ------------------------------------------------------------------
      # Inject GIT_SHA into version files before building Docker image
      # ------------------------------------------------------------------
      - name: Inject GIT_SHA into version files
        run: |
          SHA="${{ github.sha }}"
          echo "Injecting GIT_SHA=${SHA} into version files..."
          for f in \
            backend/models/route/version.py \
            backend/models/energy/version.py \
            backend/models/evaluation/version.py; do
            sed -i "s/GIT_SHA: str = \"unknown\"/GIT_SHA: str = \"${SHA}\"/" "$f"
            echo "  ✓ $f"
          done

      # ------------------------------------------------------------------
      # Start the full backend stack
      # ------------------------------------------------------------------
      - name: Start Docker stack
        run: |
          cd backend/docker
          cp .env.example .env
          # Overwrite placeholder auth values with CI-safe test values
          sed -i "s|JWT_SECRET=.*|JWT_SECRET=ci-test-secret-not-used-in-production-aabbccdd1122|" .env
          sed -i "s|RESEND_API_KEY=.*|RESEND_API_KEY=re_ci_placeholder_not_used|" .env
          docker compose up -d --build
        env:
          POSTGRES_USER:     bot_admin
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB:       target_network_test_db
          POSTGRES_PORT:     5432

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for API..."
          attempts=0
          until curl -sf http://localhost:5000/api/health > /dev/null; do
            attempts=$((attempts + 1))
            if [ $attempts -ge 60 ]; then
              echo "API did not become healthy after 2 minutes"
              docker compose -f backend/docker/docker-compose.yml logs
              exit 1
            fi
            sleep 2
          done
          echo "API is healthy."

      # ------------------------------------------------------------------
      # Set up Python and run tests
      # ------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          cd backend
          uv sync --group dev

      - name: Run integration tests
        run: |
          cd backend
          uv run --group dev pytest tests/ -v --timeout=60
        env:
          POSTGRES_HOST:     localhost
          POSTGRES_PORT:     5432
          POSTGRES_DB:       target_network_test_db
          POSTGRES_USER:     bot_admin
          POSTGRES_PASSWORD: devpassword
          API_BASE_URL:      http://localhost:5000

      # ------------------------------------------------------------------
      # Always print logs on failure
      # ------------------------------------------------------------------
      - name: Print Docker logs on failure
        if: failure()
        run: docker compose -f backend/docker/docker-compose.yml logs