# Pre-commit hooks for night-train-target-network
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Python formatting (backend)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-format
        files: ^backend/

  # JS/TS/Vue/JSON/CSS/Markdown formatting (frontend)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, vue, json, css, markdown]
        additional_dependencies:
          - prettier@3.5.3
