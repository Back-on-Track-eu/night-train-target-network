# =============================================================================
# Night Train — Standalone Database Stack
# =============================================================================
# For database architects and schema inspection only.
# Backend developers: use backend/docker/docker-compose.yml instead.
#
# This stack spins up postgres, seeds it with test data, and starts Mathesar
# for visual schema inspection — independently of the rest of the backend.
#
# Usage:
#   cd backend/db/dev
#   cp .env.example .env        # already has default values, no changes needed
#   docker-compose up -d
#   open http://localhost:8000   # Mathesar UI
#
# The seeder runs once on startup and exits. Postgres persists via a volume.
# To reset: docker-compose down -v && docker-compose up -d

services:

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: night_train_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  seeder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: night_train_seeder
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: "no"

  mathesar:
    image: mathesar/mathesar:latest
    container_name: night_train_mathesar
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECRET_KEY: change-this-later
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pgdata: