# =============================================================================
# Night Train — Backend Services
# =============================================================================
# Services:
#   postgres         — PostgreSQL database (seeded on API startup)
#   openrailrouting  — rail routing engine (GraphHopper fork)
#   api              — Flask REST API (seeds db then starts)
#
# Usage:
#   cd backend/docker
#   cp .env.example .env
#   docker-compose up -d
#
# All configuration lives in .env — see .env.example for reference.

services:

  postgres:
    image: postgres:16-alpine
    container_name: night_train_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  openrailrouting:
    build:
      context: ../models/route/routing/docker
      dockerfile: Dockerfile
    image: docker-openrailrouting
    container_name: openrailrouting
    ports:
      - "${OPENRAILROUTING_HOST_PORT:-8989}:${OPENRAILROUTING_CONTAINER_PORT:-8989}"
    volumes:
      - ../models/route/routing/docker/data:/app/data
      - ${GRAPH_CACHE_PATH}:/app/graph-cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${OPENRAILROUTING_CONTAINER_PORT:-8989}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: docker-api
    container_name: night-train-api
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Override for inter-container networking — always use service name as host
      POSTGRES_HOST:        postgres
      OPENRAILROUTING_URL:  http://openrailrouting:${OPENRAILROUTING_CONTAINER_PORT:-8989}
    depends_on:
      postgres:
        condition: service_healthy
      openrailrouting:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: