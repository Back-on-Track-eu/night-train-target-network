# =============================================================================
# Night Train — Backend Services
# =============================================================================
# Services:
#   postgres         — PostgreSQL database (test instance, seeded on startup)
#   openrailrouting  — rail routing engine (GraphHopper fork)
#   api              — Flask REST API (seeds db then starts)
#
# Usage:
#   cd backend/docker
#   docker-compose up -d
#
# Prerequisites:
#   Set GOOGLE_APPLICATION_CREDENTIALS and postgres vars in a .env file (see .env.example)

services:

  postgres:
    image: postgres:16-alpine
    container_name: night_train_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  openrailrouting:
    build:
      context: ../models/route_evaluation_model/routing/docker
      dockerfile: Dockerfile
    container_name: openrailrouting
    ports:
      - "8989:8989"
      - "8990:8990"
    volumes:
      - ../models/route_evaluation_model/routing/docker/data:/app/data
      - ../models/route_evaluation_model/routing/docker/graph-cache:/app/graph-cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: night-train-api
    ports:
      - "5000:5000"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/google_credentials
      - OPENRAILROUTING_URL=http://openrailrouting:8989
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/run/secrets/google_credentials:ro
    depends_on:
      postgres:
        condition: service_healthy
      openrailrouting:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: