<svg width="680" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
<title>Evaluation filter selection to view mapping</title>
<desc>Five filter selections map to the five evaluation views; a unit selector lists the five normalisations available inside every cell.</desc>
<style>
  .sel  { fill: #F1EFE8; stroke: #5F5E5A; }
  .view { fill: #E1F5EE; stroke: #0F6E56; }
  .unit { fill: none;    stroke: #888780; stroke-dasharray: 4 4; }
  .t1   { fill: #2C2C2A; font-size: 14px; font-weight: 500; }
  .t2   { fill: #5F5E5A; font-size: 12px; }
  .v1   { fill: #04342C; font-size: 14px; font-weight: 500; }
  .v2   { fill: #085041; font-size: 12px; }
  .arr  { stroke: #888780; }
  @media (prefers-color-scheme: dark) {
    .sel  { fill: #444441; stroke: #B4B2A9; }
    .view { fill: #085041; stroke: #5DCAA5; }
    .unit { stroke: #888780; }
    .t1   { fill: #F1EFE8; }
    .t2   { fill: #D3D1C7; }
    .v1   { fill: #E1F5EE; }
    .v2   { fill: #9FE1CB; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect class="sel" x="40" y="40" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="t1" x="165" y="58" text-anchor="middle" dominant-baseline="central">Nothing selected</text>
<text class="t2" x="165" y="78" text-anchor="middle" dominant-baseline="central">whole proposal</text>
<line class="arr" x1="290" y1="68" x2="348" y2="68" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect class="view" x="350" y="40" width="290" height="56" rx="8" stroke-width="0.5"/>
<text class="v1" x="495" y="58" text-anchor="middle" dominant-baseline="central">route</text>
<text class="v2" x="495" y="78" text-anchor="middle" dominant-baseline="central">views.route.data</text>

<rect class="sel" x="40" y="124" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="t1" x="165" y="142" text-anchor="middle" dominant-baseline="central">Trip pair selected</text>
<text class="t2" x="165" y="162" text-anchor="middle" dominant-baseline="central">or 'all' trip pairs</text>
<line class="arr" x1="290" y1="152" x2="348" y2="152" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect class="view" x="350" y="124" width="290" height="56" rx="8" stroke-width="0.5"/>
<text class="v1" x="495" y="142" text-anchor="middle" dominant-baseline="central">per_trip_pair</text>
<text class="v2" x="495" y="162" text-anchor="middle" dominant-baseline="central">data[pair].values</text>

<rect class="sel" x="40" y="208" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="t1" x="165" y="226" text-anchor="middle" dominant-baseline="central">Trip pair + country</text>
<text class="t2" x="165" y="246" text-anchor="middle" dominant-baseline="central">'all' valid on both</text>
<line class="arr" x1="290" y1="236" x2="348" y2="236" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect class="view" x="350" y="208" width="290" height="56" rx="8" stroke-width="0.5"/>
<text class="v1" x="495" y="226" text-anchor="middle" dominant-baseline="central">per_trip_pair_per_country</text>
<text class="v2" x="495" y="246" text-anchor="middle" dominant-baseline="central">data[pair][country].values</text>

<rect class="sel" x="40" y="292" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="t1" x="165" y="310" text-anchor="middle" dominant-baseline="central">Trip pair + OD relation</text>
<text class="t2" x="165" y="330" text-anchor="middle" dominant-baseline="central">origin, destination, class</text>
<line class="arr" x1="290" y1="320" x2="348" y2="320" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect class="view" x="350" y="292" width="290" height="56" rx="8" stroke-width="0.5"/>
<text class="v1" x="495" y="310" text-anchor="middle" dominant-baseline="central">per_trip_pair_per_od</text>
<text class="v2" x="495" y="330" text-anchor="middle" dominant-baseline="central">data[pair][od_key].values</text>

<rect class="sel" x="40" y="376" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="t1" x="165" y="394" text-anchor="middle" dominant-baseline="central">Single trip + stop</text>
<text class="t2" x="165" y="414" text-anchor="middle" dominant-baseline="central">outbound or return call</text>
<line class="arr" x1="290" y1="404" x2="348" y2="404" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect class="view" x="350" y="376" width="290" height="56" rx="8" stroke-width="0.5"/>
<text class="v1" x="495" y="394" text-anchor="middle" dominant-baseline="central">per_trip_per_stop</text>
<text class="v2" x="495" y="414" text-anchor="middle" dominant-baseline="central">data[trip_id][stop_id].values</text>

<line class="arr" x1="495" y1="436" x2="495" y2="476" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect class="unit" x="40" y="480" width="600" height="196" rx="12" stroke-width="0.75"/>
<text class="t1" x="340" y="508" text-anchor="middle" dominant-baseline="central">Unit selector — same five normalisations in every cell</text>
<text class="t2" x="64" y="540" dominant-baseline="central">per_year — €/year (raw annual totals, the default)</text>
<text class="t2" x="64" y="566" dominant-baseline="central">per_operating_day — €/day the service actually runs</text>
<text class="t2" x="64" y="592" dominant-baseline="central">per_trip_km — €/km driven (both directions)</text>
<text class="t2" x="64" y="618" dominant-baseline="central">per_available_place_km — €/offered capacity-km, demand-independent</text>
<text class="t2" x="64" y="644" dominant-baseline="central">per_sold_place_km — €/sold place-km (empty od_pairs → not meaningful)</text>
</svg>
