[project]
name = "night-train-target-network"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "dotenv>=0.9.9",
    "flask>=3.1.3",
    "flask-cors>=6.0.5",
    "flask-limiter>=4.1.1",
    "gspread>=6.2.1",
    "psycopg2-binary>=2.9.12",
    "pyjwt>=2.13.0",
    "pyyaml>=6.0.3",
    "requests>=2.34.2",
    "resend>=2.32.2",
    "gunicorn>=23.0.0",
    "shapely>=2.1.2",
]

[dependency-groups]
dev = [
    "jupyterlab>=4.6.0",
    "pandas>=3.0.3",
    "pytest>=8.0",
    "pytest-timeout>=2.3",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths  = ["tests"]
