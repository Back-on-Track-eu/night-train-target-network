services:
  postgres:
    image: postgres:16-alpine
    container_name: night_train_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  seeder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: night_train_seeder
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres   # resolves via the Docker network, not localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: "no"

  mathesar:
    image: mathesar/mathesar:latest
    container_name: night_train_mathesar
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECRET_KEY: change-this-later   # fine for local testing; swap for a real random value if this stops being throwaway
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pgdata: